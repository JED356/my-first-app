<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TaxAI — Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: Arial, sans-serif;
        background-color: #f0f4f8;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }

      .card {
        background: white;
        border-radius: 12px;
        padding: 40px;
        width: 100%;
        max-width: 400px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      }

      .logo {
        font-size: 13px;
        font-weight: 600;
        color: #0066cc;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        margin-bottom: 8px;
      }

      h1 {
        font-size: 24px;
        color: #1a1a2e;
        margin-bottom: 8px;
      }

      .subtitle {
        font-size: 14px;
        color: #666;
        margin-bottom: 32px;
      }

      label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        color: #444;
        margin-bottom: 6px;
      }

      input {
        width: 100%;
        padding: 12px 16px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 16px;
        margin-bottom: 16px;
        outline: none;
        transition: border-color 0.2s;
      }

      input:focus {
        border-color: #0066cc;
      }

      button {
        width: 100%;
        padding: 14px;
        background-color: #0066cc;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: background-color 0.2s;
        margin-bottom: 12px;
      }

      button:hover {
        background-color: #0052a3;
      }

      button.secondary {
        background-color: white;
        color: #0066cc;
        border: 1px solid #0066cc;
      }

      button.secondary:hover {
        background-color: #f0f4f8;
      }

      .message {
        font-size: 13px;
        padding: 12px;
        border-radius: 8px;
        margin-bottom: 16px;
        display: none;
      }

      .message.error {
        background-color: #fee2e2;
        color: #dc2626;
      }

      .message.success {
        background-color: #dcfce7;
        color: #16a34a;
      }

      .divider {
        text-align: center;
        font-size: 12px;
        color: #aaa;
        margin-bottom: 12px;
      }
    </style>
  </head>
  <body>

      <div class="message error" id="error-msg"></div>
      <div class="message success" id="success-msg"></div>

      <label for="email">Email address</label>
      <input type="email" id="email" placeholder="you@example.com" />

      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" />

      <button onclick="handleLogin()">Sign In</button>
      <div class="divider">or</div>
      <button class="secondary" onclick="handleRegister()">Create Account</button>
    </div>
